name: Lint

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint:
        name: PSScriptAnalyzer
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install PSScriptAnalyzer
              shell: pwsh
              run: |
                  Set-PSRepository PSGallery -InstallationPolicy Trusted
                  Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

            - name: Run PSScriptAnalyzer
              shell: pwsh
              run: |
                  $results = Invoke-ScriptAnalyzer -Path ./PSExchangeClock -Recurse -Severity Warning
                  if ($results) {
                      $results | Format-Table -AutoSize
                      throw "PSScriptAnalyzer found $($results.Count) issue(s)."
                  }
                  Write-Host "PSScriptAnalyzer: No issues found." -ForegroundColor Green

            - name: Validate module manifest
              shell: pwsh
              run: |
                  $manifest = Test-ModuleManifest -Path ./PSExchangeClock/PSExchangeClock.psd1
                  Write-Host "Module: $($manifest.Name) v$($manifest.Version)" -ForegroundColor Green
